name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancel an in-progress run when a newer commit supersedes it on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        # Real measured coverage sits at 97 percent, so the gate is parked a few points under.
        run: pytest --cov=state_reconciler --cov-report=term-missing --cov-fail-under=100

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: pip install build
      - name: Build distributions
        run: python -m build
      - uses: actions/upload-artifact@v4.4.3
        with:
          name: dist
          path: dist/
